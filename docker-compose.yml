services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-365}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      # DB_ENGINE=local (default) uses the "db" container below.
      # DB_ENGINE=supabase uses a hosted Supabase Postgres instance instead.
      - DB_ENGINE=${DB_ENGINE:-local}
      - POSTGRES_DB=${POSTGRES_DB:-statement_ai_db}
      - POSTGRES_USER=${POSTGRES_USER:-statement_ai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-statement_ai_password}
      - SUPABASE_DB_HOST=${SUPABASE_DB_HOST:-}
      - SUPABASE_DB_PORT=${SUPABASE_DB_PORT:-5432}
      - SUPABASE_DB_NAME=${SUPABASE_DB_NAME:-postgres}
      - SUPABASE_DB_USER=${SUPABASE_DB_USER:-}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD:-}
      - SUPABASE_DB_SSLMODE=${SUPABASE_DB_SSLMODE:-require}
    depends_on:
      db:
        condition: service_started
        required: false

  cron:
    build: .
    command: [ "sh", "/app/cron/entrypoint.sh" ]
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-365}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - DB_ENGINE=${DB_ENGINE:-local}
      - POSTGRES_DB=${POSTGRES_DB:-statement_ai_db}
      - POSTGRES_USER=${POSTGRES_USER:-statement_ai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-statement_ai_password}
      - SUPABASE_DB_HOST=${SUPABASE_DB_HOST:-}
      - SUPABASE_DB_PORT=${SUPABASE_DB_PORT:-5432}
      - SUPABASE_DB_NAME=${SUPABASE_DB_NAME:-postgres}
      - SUPABASE_DB_USER=${SUPABASE_DB_USER:-}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD:-}
      - SUPABASE_DB_SSLMODE=${SUPABASE_DB_SSLMODE:-require}
    depends_on:
      db:
        condition: service_started
        required: false

  # Only starts when the "local" profile is active (the default - see below).
  # With DB_ENGINE=supabase this container is skipped entirely instead of
  # just sitting there unused.
  db:
    image: postgres:15-alpine
    profiles: [ "local" ]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-statement_ai_db}
      - POSTGRES_USER=${POSTGRES_USER:-statement_ai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-statement_ai_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  media_data:
