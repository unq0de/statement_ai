services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-365}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - POSTGRES_DB=${POSTGRES_DB:-statement_ai_db}
      - POSTGRES_USER=${POSTGRES_USER:-statement_ai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-statement_ai_password}
    depends_on:
      - db

  cron:
    build: .
    command: [ "sh", "/app/cron/entrypoint.sh" ]
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-365}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - POSTGRES_DB=${POSTGRES_DB:-statement_ai_db}
      - POSTGRES_USER=${POSTGRES_USER:-statement_ai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-statement_ai_password}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-statement_ai_db}
      - POSTGRES_USER=${POSTGRES_USER:-statement_ai_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-statement_ai_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  media_data:
