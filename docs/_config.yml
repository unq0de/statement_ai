theme: jekyll-theme-minimal
title: Statement AI
description: AI-powered REST API that extracts, categorizes and summarizes bank statement transactions from PDFs using Google Gemini and Django REST Framework.

# This site is served at the domain root (https://unq0de.github.io/), so no
# baseurl prefix is needed. Only set this to "/repo-name" if you ever move
# the docs to a project-page URL like https://<user>.github.io/<repo>/.
baseurl: ""

# Pretty URLs: "/getting-started/" instead of "/getting-started.html"
permalink: pretty

show_downloads: false

# Single source of truth for the sidebar navigation.
# Add/remove/reorder pages here — the layout renders this list automatically
# and highlights whichever page is currently active.
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started/
  - title: Features & Tech Stack
    url: /features/
  - title: Using Supabase
    url: /supabase/
  - title: Privacy & GDPR
    url: /privacy-gdpr/
  - title: API Reference
    url: /api-reference/
  - title: Project Structure
    url: /project-structure/

# NOTE: layout is set explicitly per-page (front matter) instead of via a
# global "defaults" rule here. A site-wide default that also matches
# assets/css/style.scss would make Jekyll try to run the stylesheet through
# the HTML layout too, which silently breaks the CSS build. Keeping it
# per-page avoids that trap entirely.

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - README.md
